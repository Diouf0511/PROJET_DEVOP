name: Titanic CI

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install streamlit plotly pandas seaborn pytest flake8
      - name: Run Lint and Tests
        run: |
          # --exit-zero permet de valider même s'il y a des erreurs de style
          python -m pytest --exit-zero